 <!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Assessment</title>

    <link rel="stylesheet" href="assessment.css">
</head>

<body>

<div class="container">

    <h2>Financial Assessment</h2>

    <div class="progress-bar">
    <div id="progressFill"></div>
    </div>

    <form id="assessmentForm">

       
        <div class="step active">
            <p>What best describes your current income situation?</p>

            <label>
            <input type="radio" name="q1" value="20">
            <span>Stable fixed income</span>
            </label>
            <label>
            <input type="radio" name="q1" value="10">
            <span> New job or variable income</span>
            </label>
            <label><input type="radio" name="q1" value="0"> 
            <span>No stable income</span>
            </label>
        </div>

        <div class="step">
            <p>What percentage of your monthly income do you usually save?</p>

            <label><input type="radio" name="q2" value="20"> 
            <span>More than 20%</span>
            </label>
            <label><input type="radio" name="q2" value="10"> 
            <span>10% – 20%</span>
            </label>
            <label><input type="radio" name="q2" value="0">
            <span> Less than 10%</span>
            </label>
        </div>

        <div class="step">
            <p>For how many months can your emergency savings cover your expenses?</p>

            <label><input type="radio" name="q3" value="20">
            <span> More than 3 months</span>
            </label>
            <label><input type="radio" name="q3" value="10"> 
            <span>1 – 3 months</span>
            </label>
            <label><input type="radio" name="q3" value="0">
            <span>Less than 1 month / none</span> 
            </label>
        </div>

        <div class="step">
            <p>What best describes your current debt situation?</p>

            <label><input type="radio" name="q4" value="20"> 
            <span>No debt</span>
            </label>
            <label><input type="radio" name="q4" value="10"> 
            <span>Small / manageable debt</span>
            </label>
            <label><input type="radio" name="q4" value="0"> 
            <span>High debt</span>
            </label>
        </div>

        <div class="step">
            <p>How well do you follow your monthly budget?</p>

            <label><input type="radio" name="q5" value="20"> 
            <span>I follow consistently</span>
            </label>
            <label><input type="radio" name="q5" value="10"> 
            <span>Sometimes exceed</span>
            </label>
            <label><input type="radio" name="q5" value="0"> 
            <span>Frequently exceed</span>
            </label>
        </div>

        <div class="buttons">
            <button type="button" id="prevBtn">Previous</button>
            <button type="button" id="nextBtn">Next</button>
        </div>

    </form>
    <audio id="clickSound" src="click.mp3"></audio>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="assessment.js"></script>

</body>
</html>
